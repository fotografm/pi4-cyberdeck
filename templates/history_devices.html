{% extends "history_base.html" %}
{% block title %}History WiFi — Devices{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
  <h1 style="margin:0">Device Fingerprints</h1>
  <span id="tick" style="font-size:10px;color:var(--dim);margin-left:auto"></span>
</div>
<p style="color:var(--dim);font-size:11px;margin-bottom:14px">
  Each row is one unique physical device fingerprint, stable across MAC rotation. Click for detail.
</p>
<div id="devices-list"></div>
{% endblock %}
{% block scripts %}
<script>
function load() {
    fetch('/api/devices').then(function(r){ return r.json(); }).then(function(rows){
        var list = document.getElementById('devices-list');
        list.innerHTML = '';
        if (!rows.length) {
            list.innerHTML = '<p class="no-data">No device fingerprints yet.</p>';
            return;
        }
        rows.forEach(function(d) {
            var div = document.createElement('div');
            div.className = 'device-card';
            div.style.cursor = 'pointer';
            div.addEventListener('click', function(){ window.location.href = '/devices/' + d.fp_hash; });
            div.innerHTML =
                '<div class="device-hdr">' +
                '<span class="badge badge-' + (d.os_hint||'unknown') + '">' + (d.os_hint||'unknown') + '</span>' +
                '<span class="device-vendor">' + (d.vendor||'Unknown vendor') + '</span>' +
                '<span style="font-family:monospace;font-size:10px;color:var(--dim)" title="' + d.fp_hash + '">fp:' + d.fp_hash.slice(0,16) + '&hellip;</span>' +
                '<span class="chip">' + (d.probe_count||0) + ' probes</span>' +
                '<span class="chip">' + (d.mac_count||0) + ' MAC' + (d.mac_count!==1?'s':'') + '</span>' +
                '<span class="chip">' + fmtAgo(d.last_seen) + '</span>' +
                '<span style="font-size:10px;color:var(--heading)">Detail &rarr;</span>' +
                '</div>';
            list.appendChild(div);
        });
    }).catch(function(){});
}
var cd = 10;
setInterval(function(){
    cd--;
    document.getElementById('tick').textContent = 'refresh in ' + cd + 's';
    if (cd <= 0) { cd = 10; load(); }
}, 1000);
load();
</script>
{% endblock %}
