<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>raspi83 &mdash; Notes</title>
<link rel="stylesheet" href="http://placeholder/raspi-style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background:var(--bg);color:var(--text);font-family:monospace;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column; }
#titlebar { height:48px;flex-shrink:0;background:var(--panel);border-bottom:1px solid #5555bb;display:flex;align-items:center;padding:0 14px;gap:10px; }
#titlebar h1 { font-size:12px;font-weight:normal;letter-spacing:4px;text-transform:uppercase;color:#99aaff;white-space:nowrap;flex-shrink:0; }
#search-wrap { position:relative;width:200px;flex-shrink:0; }
#search { width:100%;background:#080820;border:1px solid #5555bb;border-radius:3px;color:var(--text);font-family:monospace;font-size:12px;padding:5px 24px 5px 8px;outline:none;transition:border-color 0.15s; }
#search:focus { border-color:#8888ff; }
#search::placeholder { color:#6666aa; }
#search-clear { position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8888cc;cursor:pointer;font-size:12px;display:none;padding:0; }
#search-clear.visible { display:block; }
#search-clear:hover { color:var(--text); }
#match-count { font-size:11px;color:#aaaaee;white-space:nowrap;min-width:60px; }
#back-btn { background:#0d0d30;border:1px solid #5566cc;border-radius:3px;color:#aabbff;font-family:monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:5px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.15s,border-color 0.15s;text-decoration:none; }
#back-btn:hover { background:#1a1a50;border-color:#8899ff;color:#ccddff; }
#new-btn { background:#0d0d30;border:1px solid #5566cc;border-radius:3px;color:#aabbff;font-family:monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:5px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.15s,border-color 0.15s; }
#new-btn:hover { background:#1a1a50;border-color:#8899ff;color:#ccddff; }
#titlebar-spacer { flex:1; }
#save-status { font-size:10px;letter-spacing:1px;white-space:nowrap;min-width:60px;text-align:right;color:var(--value-green); }
#layout { flex:1;display:flex;overflow:hidden; }
#notes-list { width:240px;flex-shrink:0;border-right:1px solid #5555bb;overflow-y:auto;background:var(--panel); }
#notes-list::-webkit-scrollbar { width:4px; }
#notes-list::-webkit-scrollbar-thumb { background:#3333aa;border-radius:2px; }
.note-item { padding:10px 12px;border-bottom:1px solid #222255;cursor:pointer;transition:background 0.1s; }
.note-item:hover { background:#111140; }
.note-item.active { background:#181850;border-left:3px solid #6677ee; }
.note-item.hidden { display:none; }
.note-item-title { font-size:12px;color:#d0d0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
.note-item.active .note-item-title { color:#ffffff; }
.note-item-preview { font-size:11px;color:#9999cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.note-item-time { font-size:10px;color:#7777bb;margin-top:3px; }
.note-item.active .note-item-time { color:#9999dd; }
mark { background:#3a3a00;color:#ffff66;border-radius:2px;padding:0 1px; }
#editor-pane { flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg); }
#editor-toolbar { display:none;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid #333366;flex-shrink:0;gap:10px; }
#note-title-input { flex:1;background:transparent;border:none;outline:none;color:#e0e0ff;font-family:monospace;font-size:14px;letter-spacing:1px;min-width:0; }
#note-title-input::placeholder { color:#5555aa; }
#note-title-input:focus { color:#ffffff; }
#delete-btn { background:none;border:1px solid #cc3333;border-radius:3px;color:var(--value-alert);font-family:monospace;font-size:11px;padding:3px 10px;cursor:pointer;letter-spacing:1px;flex-shrink:0;transition:background 0.15s; }
#delete-btn:hover { border-color:#ff4444;color:#ff9999;background:#1a0808; }
#delete-btn:disabled { opacity:0.25;cursor:default;pointer-events:none; }
#note-content-input { display:none;flex:1;background:transparent;border:none;outline:none;color:#d0d0ff;font-family:monospace;font-size:13px;line-height:1.8;padding:16px;resize:none; }
#note-content-input::placeholder { color:#5555aa; }
#note-content-input:focus { color:#ffffff; }
#no-note { flex:1;display:flex;align-items:center;justify-content:center;color:#5555aa;font-size:12px;letter-spacing:3px;text-transform:uppercase; }
</style>
</head>
<body>
<div id="titlebar">
    <a id="back-btn" href="#" onclick="window.location.href='http://'+location.hostname;return false;">&#8592; Home</a>
    <h1>raspi83 &mdash; Notes</h1>
    <div id="search-wrap">
        <input id="search" type="text" placeholder="Search&hellip;"
               oninput="onSearch(this.value)" autocomplete="off" spellcheck="false">
        <button id="search-clear" onclick="clearSearch()" title="Clear">&#x2715;</button>
    </div>
    <span id="match-count"></span>
    <button id="new-btn" onclick="newNote()">+ New</button>
    <span id="titlebar-spacer"></span>
    <span id="save-status"></span>
</div>
<div id="layout">
    <div id="notes-list"></div>
    <div id="editor-pane">
        <div id="editor-toolbar">
            <input id="note-title-input" type="text" placeholder="Title&hellip;" spellcheck="false">
            <button id="delete-btn" disabled>Delete</button>
        </div>
        <textarea id="note-content-input" placeholder="Start typing&hellip;" spellcheck="false"></textarea>
        <div id="no-note">Select a note or create a new one</div>
    </div>
</div>
<script>
'use strict';
(function(){var links=document.querySelectorAll('link[rel="stylesheet"]');links.forEach(function(l){if(l.href.indexOf('raspi-style')!==-1)l.href='http://'+location.hostname+':8091/raspi-style.css';});})();
var notes=[],activeId=null,saveTimer=null,searchQuery='';
var notesList=document.getElementById('notes-list');
var saveStatus=document.getElementById('save-status');
var matchCount=document.getElementById('match-count');
var searchEl=document.getElementById('search');
var clearBtn=document.getElementById('search-clear');
var noNote=document.getElementById('no-note');
var toolbar=document.getElementById('editor-toolbar');
var titleInput=document.getElementById('note-title-input');
var contentInput=document.getElementById('note-content-input');
var deleteBtn=document.getElementById('delete-btn');
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtTime(ts){var d=new Date(ts*1000);try{return d.toLocaleString('de-DE',{timeZone:'Europe/Berlin',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return d.toDateString();}}
function preview(c){return(c||'').replace(/\n/g,' ').trim().slice(0,55);}
function hl(text,q){var e=escHtml(text||'');if(!q)return e;var s=escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp('('+s+')','gi'),'<mark>$1</mark>');}
function renderList(){
    notesList.innerHTML='';
    var q=searchQuery.toLowerCase();
    var sorted=notes.slice().sort(function(a,b){return b.ts-a.ts;});
    var visible=0;
    sorted.forEach(function(n){
        var show=!q||(n.title||'').toLowerCase().indexOf(q)!==-1||(n.content||'').toLowerCase().indexOf(q)!==-1;
        var div=document.createElement('div');
        div.className='note-item'+(n.id===activeId?' active':'')+(show?'':' hidden');
        div.dataset.id=n.id;
        div.innerHTML='<div class="note-item-title">'+hl(n.title||'Untitled',q)+'</div>'+
            '<div class="note-item-preview">'+hl(preview(n.content),q)+'</div>'+
            '<div class="note-item-time">'+fmtTime(n.ts)+'</div>';
        div.addEventListener('click',function(){openNote(n.id);});
        notesList.appendChild(div);
        if(show)visible++;
    });
    matchCount.textContent=q?(visible+' match'+(visible!==1?'es':'')):(notes.length?notes.length+' note'+(notes.length!==1?'s':''):'');
}
function onSearch(val){searchQuery=val.trim();clearBtn.classList.toggle('visible',searchQuery.length>0);renderList();}
function clearSearch(){searchEl.value='';searchQuery='';clearBtn.classList.remove('visible');renderList();searchEl.focus();}
function openNote(id){
    activeId=id;var n=notes.find(function(x){return x.id===id;});if(!n)return;
    noNote.style.display='none';toolbar.style.display='flex';contentInput.style.display='block';
    titleInput.value=n.title||'';contentInput.value=n.content||'';deleteBtn.disabled=false;renderList();
}
function onEdit(){if(!activeId)return;saveStatus.textContent='unsaved\u2026';saveStatus.style.color='#bbbb44';clearTimeout(saveTimer);saveTimer=setTimeout(saveActive,1200);}
titleInput.addEventListener('input',onEdit);contentInput.addEventListener('input',onEdit);
function saveActive(){
    if(!activeId)return;
    var n=notes.find(function(x){return x.id===activeId;});if(!n)return;
    n.title=titleInput.value;n.content=contentInput.value;n.ts=Date.now()/1000;
    fetch('http://'+location.hostname+':8097/api/notes/'+activeId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:n.title,content:n.content})})
    .then(function(){saveStatus.textContent='saved \u2713';saveStatus.style.color='#66dd66';renderList();})
    .catch(function(){saveStatus.textContent='error';saveStatus.style.color='#ff6666';});
}
function newNote(){
    clearSearch();
    fetch('http://'+location.hostname+':8097/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'',content:''})})
    .then(function(r){return r.json();}).then(function(n){notes.push(n);renderList();openNote(n.id);titleInput.focus();});
}
deleteBtn.addEventListener('click',function(){
    if(!activeId||!confirm('Delete this note?'))return;
    var id=activeId;
    fetch('http://'+location.hostname+':8097/api/notes/'+id,{method:'DELETE'}).then(function(){
        notes=notes.filter(function(n){return n.id!==id;});activeId=null;
        toolbar.style.display='none';contentInput.style.display='none';noNote.style.display='flex';
        renderList();
        if(notes.length>0)openNote(notes.slice().sort(function(a,b){return b.ts-a.ts;})[0].id);
    });
});
fetch('http://'+location.hostname+':8097/api/notes').then(function(r){return r.json();}).then(function(data){
    notes=data;renderList();
    if(notes.length>0)openNote(notes.slice().sort(function(a,b){return b.ts-a.ts;})[0].id);
}).catch(function(){});
</script>
</body>
</html>
