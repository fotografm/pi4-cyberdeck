<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>raspi81 Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: monospace;
}
#titlebar {
    height: 30px;
    background: #0a0a0a;
    border-bottom: 1px solid #002200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
}
#titlebar-title {
    font-size: 10px;
    color: #006600;
    text-transform: uppercase;
    letter-spacing: 3px;
}
#conn-status {
    font-size: 10px;
    color: #004400;
    letter-spacing: 1px;
}
#term-container {
    position: fixed;
    top: 30px; left: 0; right: 0; bottom: 0;
    padding: 4px 6px;
    background: #000;
}
</style>
</head>
<body>
<div id="titlebar">
    <span id="titlebar-title">raspi81 &mdash; Terminal</span>
    <span id="conn-status">connecting&hellip;</span>
</div>
<div id="term-container"></div>
<script>
'use strict';

var statusEl = document.getElementById('conn-status');

var term = new Terminal({
    cursorBlink: true,
    fontSize:    13,
    fontFamily:  '"DejaVu Sans Mono", "Courier New", monospace',
    theme: {
        background:          '#000000',
        foreground:          '#00ff00',
        cursor:              '#00ff00',
        cursorAccent:        '#000000',
        selectionBackground: '#004400',
        black:   '#000000', brightBlack:   '#555555',
        red:     '#cc0000', brightRed:     '#ff3333',
        green:   '#00cc00', brightGreen:   '#00ff00',
        yellow:  '#cccc00', brightYellow:  '#ffff55',
        blue:    '#0000cc', brightBlue:    '#5555ff',
        magenta: '#cc00cc', brightMagenta: '#ff55ff',
        cyan:    '#00cccc', brightCyan:    '#55ffff',
        white:   '#cccccc', brightWhite:   '#ffffff',
    },
    scrollback: 2000,
    allowTransparency: false,
});

var fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('term-container'));

function doFit() {
    try { fitAddon.fit(); } catch(e) {}
}

setTimeout(doFit, 80);
window.addEventListener('resize', function() { doFit(); sendResize(); });
new ResizeObserver(function() { doFit(); sendResize(); })
    .observe(document.getElementById('term-container'));

var ws;
function sendResize() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }
}

function connect() {
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(wsProto + '//' + location.hostname + ':8096/ws');
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
        statusEl.textContent = 'connected';
        statusEl.style.color = '#00aa00';
        doFit();
        sendResize();
    };

    ws.onclose = function() {
        statusEl.textContent = 'reconnecting in 3s\u2026';
        statusEl.style.color = '#664400';
        term.write('\r\n\x1b[33m[disconnected \u2014 reconnecting in 3s]\x1b[0m\r\n');
        setTimeout(connect, 3000);
    };

    ws.onerror = function() {
        statusEl.textContent = 'error';
        statusEl.style.color = '#aa0000';
    };

    ws.onmessage = function(e) {
        if (e.data instanceof ArrayBuffer) {
            term.write(new Uint8Array(e.data));
        }
    };
}

term.onData(function(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(data));
    }
});

connect();
</script>
</body>
</html>
